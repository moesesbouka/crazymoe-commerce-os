name: Perfect Code Check
on: [push]
jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with: { node-version: 18 }
      - name: Install Deps
        run: npm install
      - name: Install Playwright
        run: npx playwright install --with-deps
      - name: Run Background Tests
        run: npm test
