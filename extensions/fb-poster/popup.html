<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CrazyMoe FB Poster</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{width:340px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#080c14;color:#eef2ff}
.hdr{padding:14px 16px;background:#0d1220;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:10px}
.hdr-icon{width:28px;height:28px;border-radius:8px;background:#f59e0b;display:grid;place-items:center;font-weight:900;font-size:10px;color:#000;flex-shrink:0}
.hdr-title{font-size:13px;font-weight:800}
.hdr-ver{font-size:10px;color:#6573a0;margin-left:auto}
.body{padding:14px}
.section{margin-bottom:14px}
.label{font-size:11px;color:#6573a0;margin-bottom:6px;display:block;font-weight:600}
.input,.select{width:100%;padding:9px 11px;border-radius:10px;border:1px solid rgba(255,255,255,.09);background:#111827;color:#eef2ff;font:inherit;font-size:13px;outline:none}
.row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;font-size:12px;color:#94a0c5;border-bottom:1px solid rgba(255,255,255,.05)}
.row:last-child{border-bottom:none}
.pill{font-size:10px;font-weight:700;padding:3px 8px;border-radius:999px}
.pill.ok{background:rgba(61,220,151,.12);color:#3ddc97}
.pill.warn{background:rgba(245,158,11,.12);color:#f59e0b}
.pill.bad{background:rgba(255,111,125,.12);color:#ff6f7d}
.btn{width:100%;padding:10px;border-radius:10px;border:none;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;margin-top:8px}
.btn-primary{background:#f59e0b;color:#000}
.btn-secondary{background:rgba(255,255,255,.07);color:#eef2ff;border:1px solid rgba(255,255,255,.09)}
.toast{font-size:12px;padding:8px 12px;border-radius:8px;margin-top:10px;display:none;text-align:center}
.toast.ok{background:rgba(61,220,151,.12);color:#3ddc97}
.toast.bad{background:rgba(255,111,125,.12);color:#ff6f7d}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-icon">CM</div>
  <div class="hdr-title">CrazyMoe FB Poster</div>
  <div class="hdr-ver">v2.5.0</div>
</div>
<div class="body">
  <div class="section">
    <div class="row"><span>Extension</span><span class="pill ok">Active</span></div>
    <div class="row"><span>Supabase</span><span class="pill warn" id="sb-pill">Not configured</span></div>
  </div>
  <div class="section">
    <label class="label">Supabase URL</label>
    <input id="sb-url" class="input" placeholder="https://your-project.supabase.co"/>
  </div>
  <div class="section">
    <label class="label">Supabase anon key</label>
    <input id="sb-key" class="input" placeholder="eyJ..."/>
  </div>
  <div class="section">
    <label class="label">Source mode</label>
    <select id="source-mode" class="select">
      <option value="supabase">Supabase</option>
      <option value="local">Local manifest</option>
    </select>
  </div>
  <button id="save" class="btn btn-primary">Save config</button>
  <button id="test" class="btn btn-secondary">Test connection</button>
  <button id="open" class="btn btn-secondary">Open Facebook Marketplace</button>
  <div id="toast" class="toast"></div>
</div>
<script src="popup.js"></script>
</body>
</html>
