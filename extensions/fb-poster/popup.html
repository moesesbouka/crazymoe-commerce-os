<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CrazyMoe FB Poster</title>
  <style>
    body{font-family:Arial,sans-serif;background:#10131a;color:#fff;padding:14px;width:320px}
    input{width:100%;padding:10px;margin:8px 0;background:#0b0f14;border:1px solid #2a3553;color:#fff;border-radius:8px}
    button{width:100%;padding:10px;margin-top:8px;background:#3b82f6;border:none;color:#fff;border-radius:8px;font-weight:700;cursor:pointer}
    #msg{margin-top:10px;font-size:12px;color:#56d364}
  </style>
</head>
<body>
  <div>Supabase URL</div>
  <input id="url" placeholder="https://your-project.supabase.co">
  <div>Supabase anon key</div>
  <input id="key" placeholder="eyJ..." type="password">
  <button id="save">Save Config</button>
  <button id="test">Test Connection</button>
  <div id="msg"></div>
  <script src="popup.js"></script>
</body>
</html>
